<!DOCTYPE html>
<html lang="es">

<title>Porra Mundial 2026 · YonkiWorld</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060e08;--g1:#0d2016;--g2:#070d09;--gold:#d4a017;--gold2:#f0bb28;--cream:#ede8d5;--red:#c0392b;--card:#101f14;--border:#1b3820;--dim:#6a9070;--live:#22c55e;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;-webkit-tap-highlight-color:transparent}
#root{max-width:860px;margin:0 auto;padding:10px 12px 100px}

.hdr{text-align:center;padding:18px 0 10px}
.eye{font-size:10px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:4px}
.title{font-family:'Bebas Neue';font-size:clamp(2.4rem,9vw,4.2rem);letter-spacing:5px;color:var(--cream);line-height:1}
.title em{color:var(--gold);font-style:normal}
.hosts{font-size:12px;color:var(--dim);margin-top:4px}

.topbar{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px}
.tb-name{font-weight:700;font-size:15px}
.tb-sub{font-size:11px;color:var(--dim);margin-top:2px}
.tb-pts{font-family:'Bebas Neue';font-size:1.9rem;color:var(--gold);line-height:1}
.tb-ptsub{font-family:'Inter';font-size:11px;color:var(--dim);margin-left:2px}

.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;vertical-align:middle;margin-left:4px}
.b-admin{background:#7f1d1d;color:#fca5a5}
.b-lock{background:#1c3a4a;color:#7dd3fc}
.b-api{background:#14532d;color:#86efac}

.nav{display:flex;gap:3px;background:var(--g2);border-radius:10px;padding:4px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:none;padding:8px 13px;border:none;background:transparent;color:var(--dim);cursor:pointer;border-radius:7px;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s}
.nb.on{background:var(--gold);color:var(--bg)}
.nb:hover:not(.on){background:var(--border);color:var(--cream)}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.ct{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}

.auth-wrap{max-width:340px;margin:28px auto}
.atabs{display:flex;gap:3px;background:var(--g2);border-radius:8px;padding:4px;margin-bottom:14px}
.atab{flex:1;padding:8px;border:none;background:transparent;color:var(--dim);cursor:pointer;border-radius:6px;font-weight:700;font-size:14px;transition:all .15s}
.atab.on{background:var(--gold);color:var(--bg)}

.fl{margin-bottom:10px}
.fl label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:9px 11px;background:var(--g2);border:1px solid var(--border);border-radius:7px;color:var(--cream);font-size:14px;outline:none;transition:border .15s;font-family:inherit}
.fi:focus{border-color:var(--gold)}
.fi:disabled{opacity:.4;cursor:not-allowed}
.fi option{background:var(--g2)}
.err{color:#f87171;font-size:13px;margin-top:6px;text-align:center}

.btn{padding:10px 18px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-g{background:var(--gold);color:var(--bg)}.btn-g:hover{background:var(--gold2)}
.btn-full{width:100%;display:block;margin-top:12px}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:7px}
.btn-ol{background:transparent;border:1px solid var(--border);color:var(--cream)}
.btn-ol:hover{border-color:var(--gold);color:var(--gold)}

.ldot{width:6px;height:6px;background:var(--live);border-radius:50%;animation:pulse 1.4s ease-in-out infinite;display:inline-block;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.synctxt{font-size:11px;color:var(--dim);text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:5px}

.group-hd{font-family:'Bebas Neue';font-size:1.3rem;color:var(--gold);letter-spacing:3px;margin:16px 0 7px;display:flex;align-items:center;gap:8px}
.group-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.match-grid{display:grid;gap:7px;margin-bottom:4px}
.mcard{background:var(--g2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;transition:border-color .2s}
.mcard.perfect{border-color:#16a34a;background:#020d05}
.mcard.correct{border-color:#b45309;background:#0e0800}
.mcard.espana{border-left:3px solid #c60b1e}
.mdate{text-align:center;font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.pts-tag{font-size:9px;background:rgba(212,160,23,.15);color:var(--gold);padding:1px 6px;border-radius:8px;font-weight:700}
.mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.mteam{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;overflow:hidden;min-width:0}
.mteam span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mteam.away{flex-direction:row-reverse}
.flag{width:26px;height:17px;object-fit:cover;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.flag-ph{width:26px;height:17px;background:var(--border);border-radius:2px;flex-shrink:0;display:inline-block}
.mcenter{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:110px}
.result-score{font-family:'Bebas Neue';font-size:1.6rem;color:var(--gold);letter-spacing:2px;line-height:1}
.pred-row{display:flex;align-items:center;gap:5px}
.si{width:36px;height:36px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--cream);font-family:'Bebas Neue';font-size:1.2rem;outline:none;transition:border .15s;-moz-appearance:textfield}
.si::-webkit-outer-spin-button,.si::-webkit-inner-spin-button{-webkit-appearance:none}
.si:focus{border-color:var(--gold)}
.si:disabled{opacity:.35;cursor:not-allowed}
.sd{color:var(--dim);font-weight:700;font-size:13px}
.pts-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.p10{background:#081f0f;color:#4ade80}.p8{background:#0a3d1f;color:#4ade80}
.p6{background:#0d4a1f;color:#86efac}.p5{background:#0a3d1f;color:#86efac}
.p3{background:#14532d;color:#86efac}.p2{background:#1a4a2e;color:#6ee7b7}
.p1{background:#422006;color:#fed7aa}.p0{background:#450a0a;color:#fca5a5}
.pts-sys{font-size:9px;color:var(--dim);letter-spacing:.3px;margin-top:1px}
.admin-res{display:flex;align-items:center;gap:4px;margin-top:5px;justify-content:center}
.arlabel{font-size:10px;color:var(--red);font-weight:700;flex-shrink:0}

.phase-hd{text-align:center;font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:4px;color:var(--cream);margin:18px 0 5px;position:relative}
.phase-hd span{background:var(--bg);padding:0 14px;position:relative;z-index:1}
.phase-hd::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.phase-pts{text-align:center;font-size:12px;color:var(--dim);margin-bottom:10px}
.phase-pts strong{color:var(--gold)}

.ptabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.ptab{padding:5px 12px;border:1px solid var(--border);border-radius:16px;background:transparent;color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.ptab.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.ptab:hover:not(.on){border-color:var(--gold);color:var(--gold)}
.ptab.locked-tab{opacity:.45;cursor:not-allowed}

.round-locked{background:#1a1a2e;border:1px solid #2d2d5a;border-radius:10px;padding:24px;text-align:center;margin-bottom:12px}
.round-locked-icon{font-size:2rem;margin-bottom:8px}
.round-locked-title{font-family:'Bebas Neue';font-size:1.3rem;color:#818cf8;letter-spacing:2px;margin-bottom:6px}
.round-locked-sub{font-size:13px;color:var(--dim);line-height:1.5}

.locked-banner{background:#1c3a4a;border:1px solid #0e6eab;border-radius:9px;padding:10px 14px;margin-bottom:11px;font-size:13px}
.warn-banner{background:#2a1a04;border:1px solid #b45309;border-radius:9px;padding:10px 14px;margin-bottom:11px;font-size:13px;color:#fed7aa}
.adm-bar{background:#1a0404;border:1px solid #7f1d1d;border-radius:9px;padding:8px 13px;margin-bottom:10px;font-size:11px;color:#f87171;font-weight:700;text-transform:uppercase;letter-spacing:.4px}

.spain-hero{background:linear-gradient(135deg,#c60b1e 0%,#aa151b 45%,#f1bf00 100%);border-radius:12px;padding:20px;text-align:center;margin-bottom:12px;border:2px solid rgba(255,255,255,.2)}
.spain-title{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:4px;color:white;margin-top:4px}
.spain-sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px}

.aw-grid{display:grid;gap:8px}
.aw-card{background:var(--g2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.aw-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.aw-icon{font-size:1.4rem;flex-shrink:0}
.aw-name{font-weight:700;font-size:13px}
.aw-desc{font-size:11px;color:var(--dim)}
.aw-pts{font-family:'Bebas Neue';font-size:1.1rem;color:var(--gold);background:rgba(212,160,23,.12);padding:2px 9px;border-radius:7px;flex-shrink:0}
.aw-row{display:flex;gap:7px;align-items:center}
.aw-in{flex:1;padding:8px 11px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--cream);font-size:14px;outline:none;transition:border .15s;font-family:inherit}
.aw-in:focus{border-color:var(--gold)}
.aw-in:disabled{opacity:.4}
.aw-in.correct{border-color:#16a34a!important;background:#020d05!important}
.aw-in.wrong{border-color:#7f1d1d!important}
.aw-badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.ab-c{background:#14532d;color:#86efac}.ab-p{background:#1c3a4a;color:#93c5fd}.ab-w{background:#450a0a;color:#fca5a5}
.adm-off{display:flex;align-items:center;gap:6px;margin-top:7px}

.rtable{width:100%;border-collapse:collapse}
.rtable th{text-align:left;font-size:11px;color:var(--dim);padding:6px 7px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.rtable td{padding:8px 7px;border-bottom:1px solid var(--g2);font-size:14px;vertical-align:middle}
.rpts{font-family:'Bebas Neue';font-size:1.5rem;color:var(--gold);text-align:right}
.rsub{font-size:11px;color:var(--dim)}
.rme{background:rgba(212,160,23,.07)}
.pts-key{background:var(--g2);border-radius:8px;padding:11px;margin-top:11px;display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px}
.pki{display:flex;gap:6px;align-items:center}
.pkv{font-weight:700;color:var(--gold);min-width:20px}

.squad-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:8px}
.squad-player{display:flex;align-items:center;gap:6px;background:var(--g2);border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-size:13px}
.squad-remove{margin-left:auto;cursor:pointer;border:none;background:transparent;color:#f87171;font-size:16px;line-height:1}
.add-player-row{display:flex;gap:7px;margin-top:10px}

.unlock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px}
.unlock-btn{padding:10px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:inherit;text-align:left}
.unlock-open{background:#14532d;color:#86efac}
.unlock-closed{background:#1c2a3a;color:#93c5fd}

.savebar{position:fixed;bottom:0;left:0;right:0;background:var(--g2);border-top:1px solid var(--gold);padding:9px 14px;z-index:50;box-shadow:0 -8px 32px rgba(0,0,0,.5)}
.sbi{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sb-warn{font-size:13px;font-weight:600;color:#fed7aa}
.sb-ok{font-size:13px;font-weight:600;color:#86efac}

.loader{text-align:center;padding:60px 20px;color:var(--dim)}
.spin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

details>summary{list-style:none;cursor:pointer}
details>summary::-webkit-details-marker{display:none}
@media(max-width:460px){.mteam{font-size:11px}.pts-key{grid-template-columns:1fr}.topbar{grid-template-columns:1fr auto}}

.standings-wrap{display:grid;gap:14px}
.standing-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.standing-group-hd{background:var(--g2);padding:10px 14px;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;gap:8px}
.standing-group-hd .esp-tag{font-size:11px;color:#c60b1e;font-family:'Inter';font-weight:700}
.st-table{width:100%;border-collapse:collapse}
.st-table th{font-size:10px;color:var(--dim);padding:6px 8px;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.st-table th:first-child{text-align:left}
.st-table td{padding:8px 8px;text-align:center;font-size:13px;border-bottom:1px solid var(--g2)}
.st-table td:first-child{text-align:left;font-weight:600;display:flex;align-items:center;gap:7px}
.st-table tr:last-child td{border-bottom:none}
.st-table tr.elim{opacity:.45}
.st-pos{font-family:'Bebas Neue';font-size:1.1rem;width:16px;text-align:center;flex-shrink:0}
.st-pos.p1{color:var(--gold)}.st-pos.p2{color:#94a3b8}.st-pos.p3{color:var(--dim)}.st-pos.p4{color:#450a0a}
.st-pts{font-family:'Bebas Neue';font-size:1.2rem;color:var(--gold)}
.st-gd-pos{color:#86efac;font-size:12px}.st-gd-neg{color:#f87171;font-size:12px}.st-gd-zero{color:var(--dim);font-size:12px}
.no-results-yet{text-align:center;padding:16px;font-size:13px;color:var(--dim)}

/* PENDING USERS */
.pending-wrap{display:grid;gap:8px;margin-top:8px}
.pending-card{background:var(--g2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.pending-name{font-weight:700;font-size:14px;flex:1}
.pending-time{font-size:11px;color:var(--dim);margin-top:2px}
.btn-accept{background:#14532d;color:#86efac;border:none;padding:7px 14px;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer}
.btn-accept:hover{background:#16a34a;color:white}
.btn-reject{background:#450a0a;color:#fca5a5;border:none;padding:7px 14px;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer}
.btn-reject:hover{background:#7f1d1d;color:white}
.pending-badge{background:#422006;color:#fed7aa;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;animation:pulse 1.4s ease-in-out infinite}
.pending-screen{max-width:340px;margin:40px auto;text-align:center}
.pending-icon{font-size:3rem;margin-bottom:12px}
.pending-title{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:3px;color:var(--gold);margin-bottom:8px}
.pending-sub{font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:16px}
</style>
</head>

function scoreMatch(pred, result, m){
  if(!pred||!result) return 0;
  const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(result.h),ra=parseInt(result.a);
  if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra)) return 0;
  const{e,w}=m.pts;
  if(ph===rh&&pa===ra) return e;
  if(Math.sign(ph-pa)===Math.sign(rh-ra)) return w;
  return 0;
}

function scoreUser(uid,allPreds,results,offAw,offSp){
  const up=allPreds[uid]||{};

  let match=0;
  ALL_MATCHES.forEach(m=>{match+=scoreMatch(up.matches?.[m.id],results[m.id],m);});
  let award=0;
  AWARDS.forEach(a=>{const p=up.awards?.[a.id],r=offAw[a.id];if(p&&r&&p.trim().toLowerCase()===r.trim().toLowerCase())award+=a.pts;});
  let spain=0;
  ALL_SP.forEach(s=>{const p=up.spain?.[s.id],r=offSp[s.id];if(p&&r&&p.toString().toLowerCase()===r.toString().toLowerCase())spain+=s.pts;});
  return{match,award,spain,total:match+award+spain};
}

const fbGet=async p=>{try{const s=await get(ref(db,p));return s.exists()?s.val():null;}catch{return null;}};
const fbSet=async(p,v)=>{try{await set(ref(db,p),v);}catch(e){console.error(e);}};
const fbUpdate=async(p,v)=>{try{await update(ref(db,p),v);}catch(e){console.error(e);}};

// ─── API FETCH ────────────────────────────────────────────────────────────────
async function fetchAPIResults(){
  // Token gestionado por Netlify Function
  try{
    // Proxy Netlify — sin CORS
    const r=await fetch("/.netlify/functions/wc-results");
    if(!r.ok){console.warn("Proxy error:",r.status);return null;}
    const data=await r.json();
    const mapped={};
    (data.matches||[]).forEach(m=>{
      const home=API_MAP[m.homeTeam?.name]||m.homeTeam?.name;
      const away=API_MAP[m.awayTeam?.name]||m.awayTeam?.name;
      const sc=m.score?.fullTime;
      if(sc?.home!==null&&sc?.away!==null){
        const found=ALL_MATCHES.find(gm=>gm.home===home&&gm.away===away);
        if(found)mapped[found.id]={h:sc.home,a:sc.away,src:"api"};
      }
    });
    return Object.keys(mapped).length>0?mapped:null;
  }catch{return null;}
}

window.switchAuth=mode=>{S.authMode=mode;render();};

window.doAuth=async()=>{
  const u=(document.getElementById("a-user")?.value||"").trim();
  const rawPass=(document.getElementById("a-pass")?.value||"").trim();
  // Admin se identifica añadiendo #admin2026 al final de su contraseña (invisible para otros)
  const adm=rawPass.endsWith("#admin2026");
  const p=adm?rawPass.slice(0,-10):rawPass;
  const errEl=document.getElementById("auth-err");
  if(!u||!p){if(errEl)errEl.textContent="Rellena usuario y contraseña.";return;}
  const users=await fbGet("users")||{};
  if(S.authMode==="register"){
    // Check not already in users
    const allUsers=await fbGet("users")||{};
    const allPending=await fbGet("pending")||{};
    if(Object.values(allUsers).find(x=>x.username.toLowerCase()===u.toLowerCase())){if(errEl)errEl.textContent="Ese nombre ya está en uso.";return;}
    if(Object.values(allPending).find(x=>x.username.toLowerCase()===u.toLowerCase())){if(errEl)errEl.textContent="Tu solicitud ya está pendiente de aprobación.";return;}
    // Save to pending — admin must approve
    const uid="u_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
    await fbSet(`pending/${uid}`,{username:u,password:p,isAdmin:adm,requestedAt:Date.now()});
    // Show pending screen without logging in
    S.pendingUid=uid;
    S.pendingUsername=u;
    S.showPendingScreen=true;
    render();
    return;
  }else{
    const entry=Object.entries(users).find(([,x])=>x.username.toLowerCase()===u.toLowerCase()&&x.password===p);
    if(!entry){if(errEl)errEl.textContent="Usuario o contraseña incorrectos.";return;}
    S.user={uid:entry[0],username:entry[1].username,isAdmin:entry[1].isAdmin};
    startListeners();
  }
};

  fbListen("pending",      v=>{S.pending=v||{};render();});

}

function renderMatchCard(m,pred,result,isAdmin,locked,matchTeams){
  const realHome=(matchTeams&&matchTeams[m.id]?.home)||m.home;
  const realAway=(matchTeams&&matchTeams[m.id]?.away)||m.away;
  const hasRealTeams=!!(matchTeams&&matchTeams[m.id]?.home);
  const hasResult=result?.h!==undefined&&result?.h!==""&&result?.a!==undefined&&result?.a!=="";
  const hasPred=pred?.h!==undefined&&pred?.h!==""&&pred?.a!==undefined&&pred?.a!=="";
  const pts=scoreMatch(pred,result,m);
  const isSpain=realHome==="España"||realAway==="España";
  const ko=m.phase!=="grupos";
  let cls="mcard"+(isSpain?" espana":"");
  if(hasPred&&hasResult){if(pts===m.pts.e)cls+=" perfect";else if(pts>0)cls+=" correct";}
  return `<div class="${cls}">
    <div class="mdate"><span>${m.date}</span>${ko?`<span class="pts-tag">Exacto ${m.pts.e}pts · Ganador ${m.pts.w}pts</span>`:""}</div>
    <div class="mrow">
      <div class="mteam">${flag(realHome)}<span>${realHome}</span></div>

          <input class="si" type="number" min="0" max="30" value="${pred?.h??""}" placeholder="–" ${locked||hasResult?"disabled":""} data-mid="${m.id}" data-side="h" onchange="setPredSideEl(this)" onblur="setPredSideEl(this)"/>
          <span class="sd">:</span>
          <input class="si" type="number" min="0" max="30" value="${pred?.a??""}" placeholder="–" ${locked||hasResult?"disabled":""} data-mid="${m.id}" data-side="a" onchange="setPredSideEl(this)" onblur="setPredSideEl(this)"/>

// ─── GROUP STANDINGS CALCULATOR ──────────────────────────────────────────────
function calcGroupStandings(groupKey, results){
  const teams = GROUPS[groupKey].teams;
  const matches = GROUP_MATCHES.filter(m=>m.group===groupKey);
  const table = {};
  teams.forEach(t=>{ table[t]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });
  matches.forEach(m=>{
    const r=results[m.id];
    if(r===undefined||r===null||r.h===""||r.h===undefined||r.a===""||r.a===undefined) return;
    const h=parseInt(r.h), a=parseInt(r.a);
    if(isNaN(h)||isNaN(a)) return;
    table[m.home].pj++; table[m.away].pj++;
    table[m.home].gf+=h; table[m.home].gc+=a;
    table[m.away].gf+=a; table[m.away].gc+=h;
    if(h>a){
      table[m.home].pg++; table[m.home].pts+=3;
      table[m.away].pp++;
    } else if(h<a){
      table[m.away].pg++; table[m.away].pts+=3;
      table[m.home].pp++;
    } else {
      table[m.home].pe++; table[m.home].pts++;
      table[m.away].pe++; table[m.away].pts++;
    }
  });
  return Object.entries(table)
    .map(([team,s])=>({team,...s,gd:s.gf-s.gc}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team));
}

    html+='<th title="Perdidos">P</th>';
    html+='<th title="Goles a favor">GF</th>';
    html+='<th title="Goles en contra">GC</th>';
    html+='<th title="Diferencia de goles">DG</th>';
    html+='<th title="Puntos">Pts</th>';
    html+='</tr></thead><tbody>';
    rows.forEach((r,i)=>{
      const pos=i+1;
      const posClass=pos===1?'p1':pos===2?'p2':pos===3?'p3':'p4';
      const elimClass=pos===4?' class="elim"':'';
      const gdVal=r.gd>0?'+'+r.gd:r.gd;
      const gdColor=r.gd>0?'st-gd-pos':r.gd<0?'st-gd-neg':'st-gd-zero';
      const flagCode=TEAM_FLAGS[r.team];
      const flagHtml=flagCode?'<img class="flag" src="https://flagcdn.com/w40/'+flagCode+'.png" alt="'+r.team+'" onerror="this.style.display=\'none\'">':'<span class="flag-ph"></span>';
      html+='<tr'+elimClass+'>';
      html+='<td><span class="st-pos '+posClass+'">'+pos+'</span>'+flagHtml+'<span>'+r.team+'</span></td>';
      html+='<td>'+r.pj+'</td>';
      html+='<td>'+r.pg+'</td>';
      html+='<td>'+r.pe+'</td>';
      html+='<td>'+r.pp+'</td>';
      html+='<td>'+r.gf+'</td>';
      html+='<td>'+r.gc+'</td>';
      html+='<td><span class="'+gdColor+'">'+gdVal+'</span></td>';
      html+='<td class="st-pts">'+r.pts+'</td>';
      html+='</tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='</div>';
  return html;
}

S.loading=false;
render();
</script>
